services:
  mysql:
    image: mysql:8.0
    container_name: hiresphere-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: hiresphere
      MYSQL_ROOT_PASSWORD: rootpass
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-prootpass"]
      interval: 10s
      timeout: 5s
      retries: 10

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: hiresphere-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      VITE_API_URL: http://localhost:5000
      VITE_BOOKING_SERVICE_URL: http://localhost:4003
      VITE_INTERVIEWER_SERVICE_URL: http://localhost:4002
      VITE_SUBMISSION_SERVICE_URL: http://localhost:4004
      VITE_EVALUATION_SERVICE_URL: http://localhost:4005
      VITE_MESSAGING_SERVICE_URL: http://localhost:4006
      VITE_SIGNALING_URL: http://localhost:4007
      VITE_PACKAGE_SERVICE_URL: http://localhost:4008
    depends_on:
      - backend
      - booking-service
      - interviewer-service
      - submission-service
      - evaluation-service
      - messaging-service
      - live-session-service
      - package-service

  backend:
    image: node:20-alpine
    container_name: hiresphere-backend
    restart: unless-stopped
    working_dir: /app
    command: sh -c "npm install && npm run backend"
    ports:
      - "5000:5000"
    volumes:
      - .:/app
      - backend_node_modules:/app/node_modules
    environment:
      PORT: 5000
      CLIENT_ORIGIN: http://localhost:3000
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: rootpass
      DB_NAME: hiresphere
    depends_on:
      mysql:
        condition: service_healthy

  interviewer-service:
    build:
      context: ./services/interviewer-service
    container_name: hiresphere-interviewer-service
    restart: unless-stopped
    ports:
      - "4002:4002"
    environment:
      PORT: 4002
      CLIENT_ORIGIN: http://localhost:3000
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: rootpass
      DB_NAME: hiresphere
    depends_on:
      mysql:
        condition: service_healthy

  booking-service:
    build:
      context: ./services/booking-service
    container_name: hiresphere-booking-service
    restart: unless-stopped
    ports:
      - "4003:4003"
    environment:
      PORT: 4003
      CLIENT_ORIGIN: http://localhost:3000
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: rootpass
      DB_NAME: hiresphere
    depends_on:
      mysql:
        condition: service_healthy

  submission-service:
    build:
      context: ./services/submission-service
    container_name: hiresphere-submission-service
    restart: unless-stopped
    ports:
      - "4004:4004"
    environment:
      PORT: 4004
      CLIENT_ORIGIN: http://localhost:3000
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: rootpass
      DB_NAME: hiresphere
    depends_on:
      mysql:
        condition: service_healthy

  evaluation-service:
    build:
      context: ./services/evaluation-service
    container_name: hiresphere-evaluation-service
    restart: unless-stopped
    ports:
      - "4005:4005"
    environment:
      PORT: 4005
      CLIENT_ORIGIN: http://localhost:3000
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: rootpass
      DB_NAME: hiresphere
    depends_on:
      mysql:
        condition: service_healthy

  messaging-service:
    build:
      context: ./services/messaging-service
    container_name: hiresphere-messaging-service
    restart: unless-stopped
    ports:
      - "4006:4006"
    environment:
      PORT: 4006
      CLIENT_ORIGIN: http://localhost:3000
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: rootpass
      DB_NAME: hiresphere
    depends_on:
      mysql:
        condition: service_healthy

  live-session-service:
    build:
      context: ./services/live-session-service
    container_name: hiresphere-live-session-service
    restart: unless-stopped
    ports:
      - "4007:4007"
    environment:
      PORT: 4007
      CLIENT_ORIGIN: http://localhost:3000

  package-service:
    build:
      context: ./services/package-service
    container_name: hiresphere-package-service
    restart: unless-stopped
    ports:
      - "4008:4008"
    environment:
      PORT: 4008
      CLIENT_ORIGIN: http://localhost:3000
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: rootpass
      DB_NAME: hiresphere
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  mysql_data:
  backend_node_modules:
