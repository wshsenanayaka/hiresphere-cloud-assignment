apiVersion: apps/v1
kind: Deployment
metadata:
  name: live-session-service
  namespace: hiresphere
spec:
  replicas: 1
  selector:
    matchLabels:
      app: live-session-service
  template:
    metadata:
      labels:
        app: live-session-service
    spec:
      containers:
        - name: live-session-service
          image: 164885464221.dkr.ecr.ap-south-1.amazonaws.com/hiresphere-live-session-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 4007
          env:
            - name: PORT
              value: "4007"
            - name: CLIENT_ORIGIN
              value: http://frontend-service:3000
          envFrom:
            - configMapRef:
                name: hiresphere-config
            - secretRef:
                name: hiresphere-secret
          readinessProbe:
            httpGet:
              path: /health
              port: 4007
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 4007
            initialDelaySeconds: 30
            periodSeconds: 20
