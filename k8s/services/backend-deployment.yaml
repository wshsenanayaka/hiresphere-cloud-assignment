apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: hiresphere
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: 164885464221.dkr.ecr.ap-south-1.amazonaws.com/hiresphere-backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5000
          env:
            - name: PORT
              value: "5000"
            - name: CLIENT_ORIGIN
              value: http://frontend-service:3000
          envFrom:
            - configMapRef:
                name: hiresphere-config
            - secretRef:
                name: hiresphere-secret
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 30
            periodSeconds: 20
