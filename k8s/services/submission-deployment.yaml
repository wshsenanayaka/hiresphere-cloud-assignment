apiVersion: apps/v1
kind: Deployment
metadata:
  name: submission-service
  namespace: hiresphere
spec:
  replicas: 2
  selector:
    matchLabels:
      app: submission-service
  template:
    metadata:
      labels:
        app: submission-service
    spec:
      containers:
        - name: submission-service
          image: hiresphere-submission-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 4004
          env:
            - name: PORT
              value: "4004"
            - name: CLIENT_ORIGIN
              value: http://frontend-service:3000
          envFrom:
            - configMapRef:
                name: hiresphere-config
            - secretRef:
                name: hiresphere-secret
          readinessProbe:
            httpGet:
              path: /health
              port: 4004
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 4004
            initialDelaySeconds: 30
            periodSeconds: 20
