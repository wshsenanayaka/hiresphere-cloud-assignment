apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: hiresphere
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: 164885464221.dkr.ecr.ap-south-1.amazonaws.com/hiresphere-frontend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
