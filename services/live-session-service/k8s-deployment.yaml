apiVersion: apps/v1
kind: Deployment
metadata:
  name: live-session-service
  labels:
    app: live-session-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: live-session-service
  template:
    metadata:
      labels:
        app: live-session-service
    spec:
      containers:
        - name: live-session-service
          image: hiresphere/live-session-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 7000
          env:
            - name: PORT
              value: "7000"
            - name: CLIENT_ORIGIN
              value: "http://127.0.0.1:5173"
---
apiVersion: v1
kind: Service
metadata:
  name: live-session-service
spec:
  type: NodePort
  selector:
    app: live-session-service
  ports:
    - name: http
      port: 7000
      targetPort: 7000
      nodePort: 30700
